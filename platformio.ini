[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; 통신 속도 설정
monitor_speed = 115200

; LovyanGFX 라이브러리 종속성 추가 (자동 다운로드 및 적용됨)
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

build_flags =
    -D LGFX_USE_V1

; 문제가 되었던 플래그들을 제거하여 툴체인 충돌 방지
build_unflags =
    -fuse-cxa-atexit
    -Werror=all