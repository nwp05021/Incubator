[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = espidf

; 통신 속도 설정
monitor_speed = 115200

; LovyanGFX 라이브러리 종속성 추가 (자동 다운로드 및 적용됨)
lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16

; [중요] 컴파일러 에러 해결을 위한 빌드 플래그
build_flags =
    ; 1. C++ 전용 플래그가 C 파일에 전달될 때 에러가 발생하는 것을 방지
    -Wno-error=unused-command-line-argument
    ; 2. LovyanGFX가 ESP-IDF 컴포넌트로 동작함을 명시
    -D LGFX_USE_V1
    ; 3. 필요한 경우 추가적인 경고 무시 (선택 사항)
    -Wno-unused-variable    